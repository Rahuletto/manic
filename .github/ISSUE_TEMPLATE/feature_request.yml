name: Feature Request
description: Propose a framework feature or product-level improvement
labels: ["type: feature", "needs: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please explain the problem first, then the proposed design.
        Requests with clear tradeoffs and constraints are prioritized.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you solving and who is impacted?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Include API/CLI shape, behavior, and expected DX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you evaluate and why is this better?

  - type: dropdown
    id: scope
    attributes:
      label: Primary scope
      options:
        - CLI
        - Build engine
        - Router
        - Server runtime
        - API routes
        - Plugin system
        - Providers
        - Docs
        - Tooling/CI
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: Explicitly state what this request does not try to solve.

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      options:
        - label: I searched existing issues/discussions.
          required: true
        - label: I can help validate this feature in real projects.
          required: false
