name: Feature Request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Affected area
      options:
        - label: Build engine
        - label: Router
        - label: Server / SSR
        - label: CLI
        - label: Providers (Vercel / Netlify / Cloudflare)
        - label: Config
        - label: Plugins
        - label: Docs
