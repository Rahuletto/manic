# Required for merge queues: `merge_group` must be listed — otherwise this workflow
# never runs on the merge-group ref and GitHub shows "Expected — Waiting for status".
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#merge_group
#
# After changing this file, if the queue still waits: Rulesets may reference an old
# check name — update required checks to match the latest run, or merge once with
# admin bypass so `main` includes this trigger.

name: Framework Integration

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  # Same as ci.yml: avoid duplicate runs on PR branches (push + pull_request).
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  framework-integration:
    runs-on: ubuntu-latest
    name: Framework Integration
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup workspace
        run: bash setup.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run test:integration

      - name: Build demo
        working-directory: demo
        run: bun run build

      - name: Verify demo output
        run: |
          test -d demo/.manic/client || { echo "❌ Demo build output missing"; exit 1; }
          test -f demo/.manic/client/index.html || { echo "❌ index.html not generated"; exit 1; }
          test -f demo/.manic/server.js || { echo "❌ server.js not generated"; exit 1; }
          echo "✅ Framework integration verified"
